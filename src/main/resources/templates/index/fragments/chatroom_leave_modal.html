<div th:fragment="chatroom_leave_modal">
    <div id="chatroom_leave_modal" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Leave Room</h2>
            </header>
            <div class="modal-body">
                <div id="leaveRoomError" class="error-message" hidden></div>
                <label class="modal-label">Are you sure?</label>
            </div>
            <footer class="modal-footer">
                <button id="real_leave_btn" class="modal_btn btn-primary">Leave</button>
                <button class="modal_btn modal_close btn-secondary">Cancel</button>
            </footer>
        </div>
    </div>
</div>
